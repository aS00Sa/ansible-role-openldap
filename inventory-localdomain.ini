# SSH: same host as `ssh debian@ldap` from WSL; set ansible_host if needed; override ANSIBLE_PRIVATE_KEY_FILE if needed.
[ldap_servers]
ldap.localdomain ansible_host=192.168.1.72

[ldap_servers:vars]
ansible_user=debian
ansible_ssh_private_key_file=~/.ssh/id_rsa
# при нескольких ключах в агенте можно раскомментировать:
# ansible_ssh_common_args=-o IdentitiesOnly=yes
